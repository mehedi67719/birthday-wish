<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />

<title>Happy Birthday Mehedi 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet" />

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  background: linear-gradient(-45deg, #0f0c29, #302b63, #ff0080, #1f1c2c, #00c6ff);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
}

@keyframes bg{
  0%{ background-position:0% 50%; }
  50%{ background-position:100% 50%; }
  100%{ background-position:0% 50%; }
}

/* STARS */
.star{
  position:absolute;
  color:white;
  font-size:12px;
  opacity:.8;
  animation: twinkle 2s infinite;
}

@keyframes twinkle{
  0%,100%{ opacity:.2; transform:scale(1); }
  50%{ opacity:1; transform:scale(1.4); }
}

/* CARD */
.card{
  width:92%;
  max-width:720px;
  padding:40px 25px;
  border-radius:35px;
  background: rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  border: 1px solid rgba(255,255,255,.2);
  box-shadow: 0 0 30px rgba(255,0,128,.35), 0 0 60px rgba(0,255,255,.15);
  text-align:center;
  position:relative;
  z-index:10;
  animation:cardAnim 1s ease;
}

@keyframes cardAnim{
  from{ opacity:0; transform: translateY(60px) scale(.8); }
  to{ opacity:1; transform: translateY(0) scale(1); }
}

.card:hover{
  transform: translateY(-5px);
}

/* TITLE */
h1{
  font-size: clamp(2.3rem,8vw,5rem);
  color:white;
  text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #00ffff;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
  to{ text-shadow: 0 0 20px #00ffff, 0 0 50px #00ffff; }
}

.name{
  margin-top:15px;
  font-size: clamp(1.5rem,6vw,3rem);
  font-weight:800;
  background: linear-gradient(45deg, #ffd700, #ff69b4, #00ffff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.message{
  margin-top:20px;
  color:white;
  line-height:1.8;
  font-size:17px;
}

/* CAKE */
.cake-container{
  display:flex;
  justify-content:center;
  margin-top:35px;
}

.cake{
  position:relative;
  width:220px;
  height:180px;
}

.plate{
  position:absolute;
  width:240px;
  height:20px;
  background:#ddd;
  border-radius:50%;
  bottom:0;
  left:-10px;
}

.cake-bottom{
  position:absolute;
  width:200px;
  height:70px;
  background: linear-gradient(45deg, #ffb347, #ffcc33);
  border-radius:20px;
  bottom:20px;
  left:10px;
}

.cake-top{
  position:absolute;
  width:160px;
  height:60px;
  background: linear-gradient(45deg, #ff8fab, #ffd6e0);
  border-radius:20px;
  bottom:80px;
  left:30px;
}

.candle{
  position:absolute;
  width:18px;
  height:50px;
  background:white;
  border-radius:10px;
  left:101px;
  bottom:130px;
  cursor:pointer;
}

.flame{
  position:absolute;
  width:24px;
  height:35px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius: 50% 50% 40% 40%;
  top:-28px;
  left:-3px;
  animation:flicker .1s infinite alternate;
  box-shadow: 0 0 25px orange;
  cursor:pointer;
}

@keyframes flicker{
  from{ transform:scale(1); }
  to{ transform: scale(1.2) translateY(-2px); }
}

/* BUTTON */
.btn{
  margin-top:35px;
  border:none;
  padding:16px 35px;
  border-radius:60px;
  background: linear-gradient(45deg, #ff0080, #ff8c00);
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
  box-shadow: 0 0 20px #ff0080;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow: 0 0 40px #ff0080;
}

/* BALLOONS */
.balloon{
  position:absolute;
  bottom:-120px;
  font-size:55px;
  animation: floatUp 10s linear infinite;
}

@keyframes floatUp{
  0%{ transform:translateY(0); }
  100%{ transform: translateY(-120vh) rotate(360deg); }
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:25px;
  animation: heartFloat 5s linear forwards;
}

@keyframes heartFloat{
  0%{ transform: translateY(0) scale(.5); opacity:1; }
  100%{ transform: translateY(-100vh) scale(1.5); opacity:0; }
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  visibility:hidden;
  transition:.4s;
  z-index:999;
}

.modal.active{
  opacity:1;
  visibility:visible;
}

.modal-box{
  width:90%;
  max-width:520px;
  padding:35px 25px;
  border-radius:35px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align:center;
  transform: scale(.5) rotate(-10deg);
  transition:.5s;
  box-shadow: 0 0 50px rgba(255,255,255,.4);
}

.modal.active .modal-box{
  transform: scale(1) rotate(0deg);
}

.modal-box h2{
  font-size:2rem;
  color:#ff0066;
}

.modal-box p{
  margin-top:15px;
  font-size:18px;
  color:#222;
  line-height:1.7;
}

.close-btn{
  margin-top:25px;
  border:none;
  padding:12px 30px;
  border-radius:50px;
  background:#ff0066;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* FIREWORK */
.fire{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  z-index:9999;
  transition:1s;
}

/* MOBILE */
@media(max-width:600px){
  .card{ padding:30px 18px; }
  .message{ font-size:15px; }
  .btn{ width:100%; font-size:16px; }
  .modal-box h2{ font-size:1.5rem; }
  .modal-box p{ font-size:15px; }
}

/* LOADING */
.loading{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:20px;
  z-index:10000;
  background:rgba(0,0,0,0.7);
  padding:15px 30px;
  border-radius:50px;
}

</style>
</head>

<body>

<!-- LOADING INDICATOR -->
<div class="loading" id="loading">Loading...</div>

<!-- BALLOONS will be added by JS -->

<!-- CARD -->
<div class="card">
  <h1 id="titleText">🎂 Happy Birthday 🎂</h1>
  <div class="name" id="nameText">Mehedi Hassan 🚀</div>
  <div class="message">
    <span id="message1">🌟 Wishing you success, happiness and an amazing future 🌟</span>
    <br><br>
    <span id="message2">💻 Future Senior MERN Stack Developer 💻</span>
  </div>

  <!-- CAKE -->
  <div class="cake-container">
    <div class="cake">
      <div class="plate"></div>
      <div class="cake-bottom"></div>
      <div class="cake-top"></div>
      <div class="candle" id="candle">
        <div class="flame" id="flame"></div>
      </div>
    </div>
  </div>

  <!-- BUTTON -->
  <button class="btn" id="surpriseBtn">Open Surprise 🎁</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="surpriseTitle">🎉 Surprise 🎉</h2>
    <p>
      <span id="surpriseText1">💖 Happy Birthday Mehedi 💖</span>
      <br><br>
      <span id="surpriseText2">🚀 One day you will become an amazing developer.</span>
      <br><br>
      <span id="surpriseText3">✨ Keep learning, keep building, never give up.</span>
    </p>
    <button class="close-btn" id="closeBtn">Close ❤️</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="voice" preload="auto" playsinline>
  <source src="birthdaysound.mp3" type="audio/mpeg">
</audio>

<script>

// ============= GLOBAL VARIABLES =============
let jsonData = null;
let musicPlayed = false;
let soundUnlocked = false;
let candleBlown = false;

const voice = document.getElementById("voice");
const modal = document.getElementById("modal");
const loadingDiv = document.getElementById("loading");

// ============= LOAD JSON DATA =============
async function loadData() {
  try {
    const response = await fetch('data.json');
    jsonData = await response.json();
    applyDataToUI();
    createBalloons();
    createStars();
    startHeartsAnimation();
    loadingDiv.style.display = "none";
  } catch (error) {
    console.error("Error loading data.json:", error);
    // Fallback data
    jsonData = {
      title: "🎂 Happy Birthday 🎂",
      name: "Mehedi Hassan 🚀",
      message1: "🌟 Wishing you success, happiness and an amazing future 🌟",
      message2: "💻 Future Senior MERN Stack Developer 💻",
      buttonText: "Open Surprise 🎁",
      surpriseTitle: "🎉 Surprise 🎉",
      surpriseText1: "💖 Happy Birthday Mehedi 💖",
      surpriseText2: "🚀 One day you will become an amazing developer.",
      surpriseText3: "✨ Keep learning, keep building, never give up.",
      closeButtonText: "Close ❤️",
      balloonEmojis: ["🎈", "🎈", "🎈", "🎈", "🎈"],
      heartEmoji: "💖",
      starChar: "✦"
    };
    applyDataToUI();
    createBalloons();
    createStars();
    startHeartsAnimation();
    loadingDiv.style.display = "none";
  }
}

function applyDataToUI() {
  document.getElementById("titleText").innerHTML = jsonData.title || "🎂 Happy Birthday 🎂";
  document.getElementById("nameText").innerHTML = jsonData.name || "Mehedi Hassan 🚀";
  document.getElementById("message1").innerHTML = jsonData.message1 || "🌟 Wishing you success, happiness and an amazing future 🌟";
  document.getElementById("message2").innerHTML = jsonData.message2 || "💻 Future Senior MERN Stack Developer 💻";
  document.getElementById("surpriseBtn").innerHTML = jsonData.buttonText || "Open Surprise 🎁";
  document.getElementById("surpriseTitle").innerHTML = jsonData.surpriseTitle || "🎉 Surprise 🎉";
  document.getElementById("surpriseText1").innerHTML = jsonData.surpriseText1 || "💖 Happy Birthday Mehedi 💖";
  document.getElementById("surpriseText2").innerHTML = jsonData.surpriseText2 || "🚀 One day you will become an amazing developer.";
  document.getElementById("surpriseText3").innerHTML = jsonData.surpriseText3 || "✨ Keep learning, keep building, never give up.";
  document.getElementById("closeBtn").innerHTML = jsonData.closeButtonText || "Close ❤️";
}

// ============= CREATE BALLOONS =============
function createBalloons() {
  const balloons = jsonData.balloonEmojis || ["🎈", "🎈", "🎈", "🎈", "🎈"];
  const positions = [5, 20, 40, 70, 90];
  const durations = [8, 11, 9, 12, 7];
  
  for(let i = 0; i < balloons.length; i++) {
    const balloon = document.createElement("div");
    balloon.classList.add("balloon");
    balloon.innerHTML = balloons[i];
    balloon.style.left = positions[i] + "%";
    balloon.style.animationDuration = durations[i] + "s";
    document.body.appendChild(balloon);
  }
}

// ============= CREATE STARS =============
function createStars() {
  const starChar = jsonData.starChar || "✦";
  for(let i = 0; i < 120; i++) {
    const star = document.createElement("div");
    star.classList.add("star");
    star.innerHTML = starChar;
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDuration = Math.random() * 3 + 1 + "s";
    document.body.appendChild(star);
  }
}

// ============= HEARTS ANIMATION =============
function startHeartsAnimation() {
  const heartEmoji = jsonData.heartEmoji || "💖";
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = heartEmoji;
    heart.style.left = Math.random() * 100 + "%";
    heart.style.bottom = "0px";
    heart.style.fontSize = Math.random() * 30 + 20 + "px";
    document.body.appendChild(heart);
    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 700);
}

// ============= FIREWORKS =============
function createFireworks() {
  for(let i = 0; i < 200; i++) {
    const fire = document.createElement("div");
    fire.classList.add("fire");
    fire.style.left = Math.random() * 100 + "vw";
    fire.style.top = Math.random() * 100 + "vh";
    fire.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
    document.body.appendChild(fire);
    
    setTimeout(() => {
      fire.style.transform = `translate(${(Math.random() - .5) * 600}px, ${(Math.random() - .5) * 600}px)`;
      fire.style.opacity = "0";
    }, 10);
    
    setTimeout(() => {
      fire.remove();
    }, 1000);
  }
}

// ============= SOUND UNLOCK (FIRST CLICK ANYWHERE) =============
function unlockSound() {
  if(soundUnlocked) return;
  
  voice.play().then(() => {
    voice.pause();
    voice.currentTime = 0;
    soundUnlocked = true;
    console.log("Sound unlocked!");
  }).catch((err) => {
    console.log("Sound unlock error:", err);
  });
}

// ============= PLAY SOUND FUNCTION =============
function playSound() {
  if(!soundUnlocked) {
    unlockSound();
    setTimeout(() => {
      voice.currentTime = 0;
      voice.play().catch(e => console.log(e));
    }, 100);
  } else {
    voice.currentTime = 0;
    voice.play().catch(e => console.log(e));
  }
}

// ============= OPEN SURPRISE MODAL =============
function openSurprise() {
  modal.classList.add("active");
  createFireworks();
  playSound();
}

function closeModal() {
  modal.classList.remove("active");
}

// ============= CANDLE BLOW EFFECT =============
const candle = document.getElementById("candle");
const flame = document.getElementById("flame");

candle.addEventListener("click", (e) => {
  e.stopPropagation();
  
  if(!candleBlown) {
    candleBlown = true;
    
    // Blow candle animation
    flame.style.transition = "0.15s";
    flame.style.transform = "scale(0)";
    flame.style.opacity = "0";
    
    // Smoke effect
    const smoke = document.createElement("div");
    smoke.innerHTML = "💨";
    smoke.style.position = "fixed";
    smoke.style.fontSize = "30px";
    smoke.style.left = e.clientX + "px";
    smoke.style.top = e.clientY + "px";
    smoke.style.pointerEvents = "none";
    smoke.style.animation = "heartFloat 1s forwards";
    document.body.appendChild(smoke);
    setTimeout(() => smoke.remove(), 1000);
    
    // Fireworks
    createFireworks();
    
    // Play sound
    playSound();
    
    // Open surprise automatically
    setTimeout(() => {
      modal.classList.add("active");
      createFireworks();
    }, 500);
  }
});

// ============= EVENT LISTENERS =============
document.getElementById("surpriseBtn").addEventListener("click", openSurprise);
document.getElementById("closeBtn").addEventListener("click", closeModal);

// First click anywhere to unlock sound
document.body.addEventListener("click", function firstClick() {
  unlockSound();
  document.body.removeEventListener("click", firstClick);
}, { once: true });

// ESC key to close modal
document.addEventListener("keydown", (e) => {
  if(e.key === "Escape") {
    closeModal();
  }
});

// Mouse glow effect
document.addEventListener("mousemove", (e) => {
  const glow = document.createElement("div");
  glow.style.position = "fixed";
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
  glow.style.width = "20px";
  glow.style.height = "20px";
  glow.style.borderRadius = "50%";
  glow.style.background = "rgba(255,255,255,.5)";
  glow.style.pointerEvents = "none";
  glow.style.filter = "blur(10px)";
  glow.style.zIndex = "9999";
  document.body.appendChild(glow);
  setTimeout(() => {
    glow.remove();
  }, 200);
});

// ============= LOAD DATA ON PAGE START =============
loadData();

</script>

</body>
</html>
